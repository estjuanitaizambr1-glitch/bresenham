<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bresenham</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: #fefff9;
    text-align: center;
    padding: 20px;
}


.container{
/* cambiamos de 700px a 900px*/
    max-width: 900px;
    margin: auto;
}


.card{
    display: inline-block;
    padding: 12px 18px;
    border-radius: 10px;
    margin: 5px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card1{
    background-color:#FFE5EC;
}

.card2{
    background-color:#E0F7FA;
}

.card b{
    display:block;
    margin-bottom:5px;
}

input{
    width:60px;
    padding:4px;
    margin:2px;
    border-radius:5px;
    border:1px solid #ccc;
    text-align:center;
}

/* Botón */
button{
    background-color:#EAD7FF;
    border:none;
    padding:8px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
/* Usamos flexbox para organizar el canvas y la tabla
   horizontalmente (canvas izquierda, tabla derecha) */
.zona{
    display: flex;

    /* Pone los elementos en horizontal */
    flex-direction: row;

    /* Centra todo en la página */
    justify-content: center;

    /* Alinea arriba */
    align-items: flex-start;

    /* Espacio entre canvas y tabla */
    gap: 30px;
}
button:hover{
    background-color:#d7bfff;
    transform:translateY(-1px);
}

/* Canvas */
canvas {
    border: 1px solid #ccc;
    display: block;
    margin: 20px auto;
    background: rgb(255, 255, 239);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Tabla */
table {
    border-collapse: collapse;
    font-size: 13px;
    margin: 0 auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

th {
    background-color: #FFE5EC;
    color: #b0446a;
    padding: 8px 16px;
    font-weight: 600;
    border-bottom: 2px solid #f7b8cc;
}

td {
    padding: 6px 16px;
    border-bottom: 1px solid #f0e0e8;
    color: #efbcff;
}

tbody tr:nth-child(even) {
    background-color: #E0F7FA;
}

tbody tr:hover {
    background-color: #b2eaf4;
}
</style>

</head>

<body>

<div class="container" style="margin-top: 60px;">

<div class="card card1">
<b>Coordenada 1</b>
X0 <input id="x0" type="number">
Y0 <input id="y0" type="number">
</div>

<div class="card card2">
<b>Coordenada 2</b>
X1 <input id="x1" type="number">
Y1 <input id="y1" type="number">
</div>

<br><br>

<button onclick="dibujar()">Dibujar</button>

<div class="zona">
    <canvas id="canvas" width="500" height="500"></canvas>

    <table id="tabla">
        </table>
        </div>
<thead>
<tr>
<th>Paso</th>
<th>X</th>
<th>Y</th>
<th>Error</th>
<th>e2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script src="script.js"></script>

</body>
</html>
